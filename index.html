<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Súper Reto Detox</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap');

:root {
  --pink: #E8637A;
  --pink-light: #FCE8EC;
  --pink-mid: #F4B8C3;
  --green: #5BAF8A;
  --green-light: #E6F5EF;
  --cream: #FDF8F5;
  --dark: #2C2420;
  --gray: #8A8480;
  --gray-light: #F0EDE8;
  --white: #FFFFFF;
  --border: rgba(44,36,32,0.1);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
}

/* HEADER */
.header {
  background: var(--white);
  padding: 20px 20px 0;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}

.app-name {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--dark);
  line-height: 1.2;
}

.app-name span { color: var(--pink); }

.app-sub {
  font-size: 12px;
  color: var(--gray);
  margin-top: 3px;
  font-weight: 300;
}

.reset-btn {
  background: var(--gray-light);
  border: none;
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  font-size: 12px;
  color: var(--gray);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

/* MINI PROGRESS PILLS */
.mini-progs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.mini-pill {
  flex: 1;
  background: var(--gray-light);
  border-radius: 30px;
  padding: 8px 10px;
  text-align: center;
  transition: background .2s;
}

.mini-pill.on {
  background: var(--pink-light);
}

.mini-pill-pct {
  font-size: 15px;
  font-weight: 600;
  color: var(--dark);
}

.mini-pill.on .mini-pill-pct { color: var(--pink); }

.mini-pill-lbl {
  font-size: 10px;
  color: var(--gray);
  margin-top: 1px;
}

/* WEEK TABS */
.week-tabs {
  display: flex;
  gap: 0;
  border-bottom: none;
}

.wtab {
  flex: 1;
  padding: 10px 8px;
  font-size: 13px;
  font-weight: 400;
  color: var(--gray);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
  text-align: center;
}

.wtab.on {
  color: var(--pink);
  border-bottom-color: var(--pink);
  font-weight: 500;
}

/* PROGRESS BAR */
.prog-section {
  padding: 14px 20px 0;
}

.prog-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 7px;
}

.prog-text { font-size: 12px; color: var(--gray); }
.prog-pct { font-size: 13px; font-weight: 600; color: var(--pink); }

.prog-bar {
  height: 5px;
  background: var(--gray-light);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 14px;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink-mid), var(--pink));
  border-radius: 3px;
  transition: width .4s ease;
}

/* SEARCH */
.search-wrap {
  padding: 0 20px 14px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 32px;
  top: 50%;
  transform: translateY(-55%);
  font-size: 15px;
  color: var(--gray);
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--border);
  border-radius: 30px;
  font-size: 14px;
  background: var(--gray-light);
  color: var(--dark);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.search-input::placeholder { color: var(--gray); }
.search-input:focus { border-color: var(--pink-mid); background: var(--white); }

/* CONTENT */
.content {
  padding: 14px 20px 100px;
}

/* CATEGORY */
.cat-block {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}

.cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  cursor: pointer;
  background: var(--white);
  -webkit-tap-highlight-color: transparent;
}

.cat-left {
  display: flex;
  align-items: center;
  gap: 9px;
}

.cat-emoji { font-size: 16px; }

.cat-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--dark);
}

.cat-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.cat-badge {
  font-size: 11px;
  background: var(--gray-light);
  color: var(--gray);
  border-radius: 20px;
  padding: 3px 9px;
}

.cat-arrow {
  font-size: 12px;
  color: var(--gray);
  transition: transform .2s;
}

.cat-arrow.open { transform: rotate(90deg); }

/* ITEMS */
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  -webkit-tap-highlight-color: transparent;
  active-background: var(--gray-light);
}

.item-row:active { background: var(--gray-light); }
.item-row.done { opacity: 0.38; }

.cb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  background: var(--white);
}

.cb.checked {
  background: var(--pink);
  border-color: var(--pink);
}

.cb.checked::after {
  content: '';
  width: 6px;
  height: 10px;
  border: 2px solid white;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translateY(-1px);
  display: block;
}

.item-info { flex: 1; min-width: 0; }

.item-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--dark);
  line-height: 1.3;
}

.item-qty {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  color: var(--pink);
  background: var(--pink-light);
  border-radius: 20px;
  padding: 2px 8px;
  margin-top: 4px;
}

.item-para {
  font-size: 12px;
  color: var(--gray);
  margin-top: 3px;
  line-height: 1.4;
}

/* BOTTOM ACTIONS */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 12px 20px 20px;
  display: flex;
  gap: 10px;
}

.btn-action {
  flex: 1;
  padding: 11px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
}

.btn-action:active { transform: scale(0.97); }

.btn-check {
  background: var(--pink);
  color: var(--white);
}

.btn-clear {
  background: var(--gray-light);
  color: var(--gray);
}

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--gray);
  font-size: 14px;
}

.empty-icon { font-size: 2rem; margin-bottom: 8px; }
</style>
</head>

let activeWeek = 0;
let checked = [{},{},{}];
let collapsed = {};

function key(wi,ci,ii){ return `${wi}-${ci}-${ii}`; }
function totalItems(wi){ return weeks[wi].cats.reduce((s,c)=>s+c.items.length,0); }
function checkedCount(wi){ return Object.keys(checked[wi]).filter(k=>checked[wi][k]).length; }

function updateProgress(){
  const wi=activeWeek;
  const tot=totalItems(wi);
  const chk=checkedCount(wi);
  const pct=tot?Math.round(chk/tot*100):0;
  document.getElementById('prog-label').textContent=`${chk} de ${tot} artículos comprados`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  for(let w=0;w<3;w++){
    const t=totalItems(w);
    const c=checkedCount(w);
    const p=t?Math.round(c/t*100):0;
    document.getElementById(`mpct${w}`).textContent=p+'%';
    document.getElementById(`mpill${w}`).classList.toggle('on',w===activeWeek);
  }
}

function render(filter){
  filter=filter||document.getElementById('search-box').value.toLowerCase();
  const wi=activeWeek;
  let html='';
  weeks[wi].cats.forEach((cat,ci)=>{
    const vis=cat.items.filter(item=>!filter||item.n.toLowerCase().includes(filter)||item.p.toLowerCase().includes(filter));
    if(!vis.length) return;
    const ckey=`${wi}-${ci}`;
    const isCol=collapsed[ckey];
    const doneInCat=vis.filter(item=>{const ii=cat.items.indexOf(item);return checked[wi][key(wi,ci,ii)];}).length;
    html+=`<div class="cat-block">
      <div class="cat-header" onclick="toggleCat(${ci})">
        <div class="cat-left">
          <span class="cat-emoji">${cat.e}</span>
          <span class="cat-name">${cat.name}</span>
        </div>
        <div class="cat-right">
          <span class="cat-badge">${doneInCat}/${vis.length}</span>
          <span class="cat-arrow${isCol?'':' open'}">›</span>
        </div>
      </div>`;
    if(!isCol){
      vis.forEach(item=>{
        const ii=cat.items.indexOf(item);
        const k=key(wi,ci,ii);
        const done=!!checked[wi][k];
        html+=`<div class="item-row${done?' done':''}" onclick="toggle('${k}')">
          <div class="cb${done?' checked':''}"></div>
          <div class="item-info">
            <div class="item-name">${item.n}</div>
            <div class="item-qty">${item.q}</div>
            <div class="item-para">${item.p}</div>
          </div>
        </div>`;
      });
    }
    html+=`</div>`;
  });
  if(!html) html=`<div class="empty-state"><div class="empty-icon">🔍</div>No encontré ese ingrediente</div>`;
  document.getElementById('content').innerHTML=html;
  updateProgress();
}

function toggle(k){
  checked[activeWeek][k]=!checked[activeWeek][k];
  render();
}

function toggleCat(ci){
  const k=`${activeWeek}-${ci}`;
  collapsed[k]=!collapsed[k];
  render();
}

function setWeek(w,btn){
  activeWeek=w;
  document.querySelectorAll('.wtab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('search-box').value='';
  render('');
}

function checkAll(){
  const wi=activeWeek;
  weeks[wi].cats.forEach((cat,ci)=>cat.items.forEach((_,ii)=>{checked[wi][key(wi,ci,ii)]=true;}));
  render();
}

function clearAll(){
  checked[activeWeek]={};
  render();
}

function resetAll(){
  if(confirm('¿Reiniciar todas las semanas?')){
    checked=[{},{},{}];
    render();
  }
}

render('');
</script>
